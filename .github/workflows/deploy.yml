name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build site + index
        run: npm run build
        working-directory: site

      - name: Summarise build
        run: |
          echo "### Build summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| HTML pages | $(find site/dist -name '*.html' | wc -l | tr -d ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap entries | $(grep -o '<url>' site/dist/sitemap-0.xml | wc -l | tr -d ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "| Pagefind index | $(du -sh site/dist/pagefind | cut -f1) |" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
